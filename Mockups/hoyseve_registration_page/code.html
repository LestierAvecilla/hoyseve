<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HoySeVe - Join the Cinematic Curator</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-tint": "#00daf3",
              "secondary-fixed": "#b3ecf7",
              "surface-container-highest": "#31353c",
              "surface-container-lowest": "#0a0e14",
              "on-tertiary-fixed": "#251a00",
              "on-primary-fixed": "#001f24",
              "primary-container": "#00e5ff",
              "on-primary-fixed-variant": "#004f58",
              "primary": "#c3f5ff",
              "on-tertiary-fixed-variant": "#594400",
              "surface-dim": "#10141a",
              "secondary-container": "#11505a",
              "on-secondary": "#00363d",
              "background": "#10141a",
              "surface-container-high": "#262a31",
              "primary-fixed": "#9cf0ff",
              "on-background": "#dfe2eb",
              "tertiary-container": "#fec931",
              "on-secondary-fixed": "#001f24",
              "on-secondary-container": "#8ac1cc",
              "outline": "#849396",
              "on-tertiary": "#3e2e00",
              "inverse-on-surface": "#2d3137",
              "tertiary-fixed-dim": "#f3bf26",
              "surface-container": "#1c2026",
              "on-surface": "#dfe2eb",
              "surface": "#10141a",
              "on-primary": "#00363d",
              "on-error": "#690005",
              "tertiary": "#ffeac0",
              "secondary-fixed-dim": "#98d0da",
              "surface-bright": "#353940",
              "primary-fixed-dim": "#00daf3",
              "inverse-surface": "#dfe2eb",
              "tertiary-fixed": "#ffdf96",
              "outline-variant": "#3b494c",
              "on-surface-variant": "#bac9cc",
              "on-secondary-fixed-variant": "#0d4e57",
              "surface-variant": "#31353c",
              "secondary": "#98d0da",
              "error-container": "#93000a",
              "error": "#ffb4ab",
              "surface-container-low": "#181c22",
              "on-error-container": "#ffdad6",
              "on-tertiary-container": "#6f5500",
              "on-primary-container": "#00626e",
              "inverse-primary": "#006875"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(28, 32, 38, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .text-glow {
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
        }
        input:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(0, 229, 255, 0.2);
        }
    </style>
</head>
<body class="bg-surface-container-lowest font-body text-on-surface min-h-screen flex flex-col">
<!-- Top Navigation (Shell Supressed for Transactional Page, only Logo remains) -->
<header class="fixed top-0 w-full z-50 px-8 py-6 flex items-center">
<div class="font-headline text-2xl font-black tracking-tighter text-primary-container uppercase">
            HoySeVe
        </div>
</header>
<!-- Main Registration Section -->
<main class="flex-grow flex items-center justify-center px-4 py-24 relative overflow-hidden">
<!-- Subtle Ambient Background Element -->
<div class="absolute top-1/4 -right-20 w-[500px] h-[500px] bg-primary-container/5 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-1/4 -left-20 w-[400px] h-[400px] bg-secondary-container/5 rounded-full blur-[100px] pointer-events-none"></div>
<!-- Registration Card -->
<div class="w-full max-w-[480px] z-10">
<div class="bg-surface-container-low rounded-xl p-8 lg:p-10 shadow-2xl relative border border-outline-variant/10">
<!-- Tab Headers -->
<div class="flex items-center gap-8 mb-10 border-b border-outline-variant/15">
<button class="pb-4 font-headline text-sm font-bold tracking-widest text-on-surface-variant transition-colors hover:text-on-surface">
                        LOG IN
                    </button>
<button class="pb-4 font-headline text-sm font-bold tracking-widest text-primary-container border-b-2 border-primary-container text-glow">
                        REGISTER
                    </button>
</div>
<div class="mb-8">
<h1 class="font-headline text-2xl font-extrabold text-on-surface mb-2">Create your account</h1>
<p class="text-on-surface-variant text-sm">Join the community of cinematic enthusiasts.</p>
</div>
<!-- Registration Form -->
<form class="space-y-6">
<!-- Username Field -->
<div class="space-y-2">
<label class="block font-headline text-[10px] font-bold uppercase tracking-widest text-on-surface-variant/80 ml-1">
                            Username
                        </label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-none rounded-xl px-4 py-3.5 text-on-surface placeholder:text-on-surface-variant/30 text-sm transition-all focus:bg-surface-container-high" placeholder="Sarah K." type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-headline text-[10px] font-bold uppercase tracking-widest text-on-surface-variant/80 ml-1">
                            Email Address
                        </label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-none rounded-xl px-4 py-3.5 text-on-surface placeholder:text-on-surface-variant/30 text-sm transition-all focus:bg-surface-container-high" placeholder="sarahk@example.com" type="email"/>
</div>
</div>
<!-- Password Fields Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-2">
<label class="block font-headline text-[10px] font-bold uppercase tracking-widest text-on-surface-variant/80 ml-1">
                                Password
                            </label>
<input class="w-full bg-surface-container-lowest border-none rounded-xl px-4 py-3.5 text-on-surface placeholder:text-on-surface-variant/30 text-sm transition-all focus:bg-surface-container-high" placeholder="••••••••" type="password"/>
</div>
<div class="space-y-2">
<label class="block font-headline text-[10px] font-bold uppercase tracking-widest text-on-surface-variant/80 ml-1">
                                Confirm Password
                            </label>
<input class="w-full bg-surface-container-lowest border-none rounded-xl px-4 py-3.5 text-on-surface placeholder:text-on-surface-variant/30 text-sm transition-all focus:bg-surface-container-high" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-3 pt-2">
<div class="flex items-center h-5">
<input class="w-4 h-4 rounded-md border-outline-variant bg-surface-container-lowest text-primary-container focus:ring-primary-container/20" id="terms" type="checkbox"/>
</div>
<label class="text-xs text-on-surface-variant leading-relaxed" for="terms">
                            I agree to the <a class="text-primary-container hover:underline" href="#">Terms of Service</a> and <a class="text-primary-container hover:underline" href="#">Privacy Policy</a>.
                        </label>
</div>
<!-- Primary CTA -->
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary-container font-headline font-bold text-sm tracking-widest py-4 rounded-xl shadow-lg shadow-primary-container/10 active:scale-[0.98] transition-all mt-4" type="submit">
                        CREATE ACCOUNT
                    </button>
<!-- Bottom Link -->
<div class="pt-6 text-center">
<p class="text-xs text-on-surface-variant">
                            Already have an account? 
                            <a class="text-primary-container font-semibold ml-1 hover:underline transition-all" href="#">Sign In</a>
</p>
</div>
</form>
</div>
<!-- Footer Meta (Simplified) -->
<div class="mt-12 flex flex-col items-center gap-4">
<div class="flex gap-6">
<span class="text-[10px] font-headline font-bold uppercase tracking-widest text-on-surface-variant/40">Secured with AES-256</span>
<span class="text-[10px] font-headline font-bold uppercase tracking-widest text-on-surface-variant/40">Verified Discovery</span>
</div>
</div>
</div>
</main>
<!-- Footer Component Execution -->
<footer class="w-full py-8 flex flex-col items-center gap-4 mt-auto border-t border-[#dfe2eb]/15 bg-[#10141a]">
<div class="flex gap-6">
<a class="font-inter text-[10px] uppercase tracking-widest text-[#dfe2eb]/40 hover:text-[#00e5ff] transition-all opacity-80 hover:opacity-100" href="#">Terms of Service</a>
<a class="font-inter text-[10px] uppercase tracking-widest text-[#dfe2eb]/40 hover:text-[#00e5ff] transition-all opacity-80 hover:opacity-100" href="#">Privacy Policy</a>
<a class="font-inter text-[10px] uppercase tracking-widest text-[#dfe2eb]/40 hover:text-[#00e5ff] transition-all opacity-80 hover:opacity-100" href="#">Cookie Settings</a>
</div>
<p class="font-inter text-[10px] uppercase tracking-widest text-[#dfe2eb]/40 opacity-80">© 2024 HoySeVe Cinematic Curator</p>
</footer>
</body></html>
